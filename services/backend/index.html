<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Чат с ИИ</title>
  </head>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&display=swap");

    :root {
      /* базовые */
      --bg: #060608;
      --panel: #181b23;
      --panel-2: #1e222d;
      --panel-3: #242938;

      --text: #e9ecf1;
      --muted: rgba(233, 236, 241, 0.6);

      --accent: #5d39f5;
      --accent-2: #3980f6;

      /* таблица */
      --table-bg: #1c1f27;
      --table-header-bg: #232733;
      --table-border: rgba(120, 120, 140, 0.25);
      --table-border-strong: rgba(160, 160, 180, 0.35);
      --table-hover: rgba(57, 128, 246, 0.08);

      --table-radius: 12px;

      /* адаптив */
      --container-width: clamp(320px, 90vw, 900px);
      --padding: clamp(12px, 2vw, 20px);
      --radius: clamp(12px, 2vw, 20px);
    }

    /* === BODY === */
    body {
      margin: 0;
      background: var(--bg);
      font-family: "Nunito", sans-serif;
      color: var(--text);
    }

    /* === КОНТЕЙНЕР === */
    .chat-container {
      height: 100dvh;
      max-width: var(--container-width);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* === HEADER === */
    .chat-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      z-index: 1000;
      padding: var(--padding);
      font-size: clamp(14px, 1.5vw, 18px);
      font-weight: 600;
      background: rgba(11, 13, 18, 0.75);
      backdrop-filter: blur(12px);
    }

    .chat-settings-btn {
      border: none;
      background: none;
    }

    /* === СООБЩЕНИЯ === */
    .chat-messages {
      flex: 1;
      display: flex;
      flex-direction: column;

      overflow-y: auto;

      padding: clamp(70px, 10vh, 100px) var(--padding) calc(140px);
    }

    /* === СКРОЛЛ === */
    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
    }

    /* === MESSAGE === */
    .message {
      display: flex;
      flex-direction: column;
      margin-bottom: clamp(8px, 1vw, 12px);
      align-items: flex-start;
      max-width: clamp(220px, 70%, 600px);
    }

    .message.user {
      align-self: flex-end;
    }
    .message.ai {
      align-self: flex-start;
    }

    .message-bubble {
      padding: clamp(8px, 1vw, 14px);
      border-radius: var(--radius);
      max-width: 100%;
      overflow: hidden;
      overflow-x: auto;
      font-size: clamp(13px, 1vw, 16px);
      line-height: 1.4;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      animation: pop 0.15s ease-out;
    }

    /* user */
    .message.user .message-bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border-bottom-right-radius: 6px;
    }

    /* ai */
    .message.ai .message-bubble {
      background: var(--panel);
      border-bottom-left-radius: 6px;
    }

    /* время */
    .message-time {
      font-size: clamp(10px, 0.8vw, 12px);
      color: var(--muted);
      margin-top: 4px;
      padding: 0 6px;
    }

    /* === INPUT === */
    .input-area {
      position: absolute;
      bottom: 20px;
      left: 16px; /* вместо 50% + translate */
      right: 16px;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 700px;
      display: flex;
      gap: clamp(6px, 1vw, 10px);
      align-items: center;
      padding: clamp(8px, 1vw, 12px) clamp(15px, 2vw, 20px);
      border-radius: 999px;
      background: rgba(11, 13, 18, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .input-area input {
      flex: 1;
      height: clamp(40px, 5vh, 50px);

      border: none;
      outline: none;
      background: transparent;

      color: var(--text);
      font-size: clamp(14px, 1vw, 16px);
    }

    .input-area button {
      width: clamp(40px, 5vh, 50px);
      height: clamp(40px, 5vh, 50px);

      border-radius: 50%;
      border: none;

      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;

      transition: 0.2s;
    }

    .input-area button:hover {
      transform: scale(1.05);
    }

    #voice-btn.active {
      transform: scale(1.25);
    }

    /* плавная пульсация */
    #voice-btn.active {
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(1.15);
      }
      50% {
        transform: scale(1.3);
      }
      100% {
        transform: scale(1.15);
      }
    }

    /* === ТАБЛИЦА === */
    .message-bubble table {
      width: max-content;
      min-width: 100%;

      border-collapse: separate;
      border-spacing: 0;

      background: var(--table-bg);
      border: 1px solid var(--table-border);
      border-radius: var(--table-radius);
      overflow: hidden;
    }

    .message-bubble th {
      position: sticky;
      top: 0;
      z-index: 2;

      padding: clamp(6px, 1vw, 10px);
      font-size: clamp(11px, 0.9vw, 13px);

      background: var(--table-header-bg);
      color: var(--muted);

      border-bottom: 1px solid var(--table-border-strong);
    }

    .message-bubble td {
      padding: clamp(6px, 1vw, 10px);
      border-bottom: 1px solid var(--table-border);
    }

    .message-bubble tbody tr:hover td {
      background: var(--table-hover);
    }

    /* === SCROLL TABLE === */
    .message-bubble::-webkit-scrollbar {
      height: 6px;
    }

    .message-bubble::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
    }

    /* === STEPPER === */
    .stepper-box {
      background: var(--panel);
      border-radius: var(--radius);
      padding: clamp(14px, 2vw, 20px);

      margin-bottom: 16px;
      width: 70%;

      align-self: stretch;
    }

    .stepper-step {
      display: flex;
      margin-bottom: 20px;
      position: relative;
    }

    .stepper-circle {
      width: clamp(30px, 4vw, 40px);
      height: clamp(30px, 4vw, 40px);
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      margin-right: 10px;
    }

    .stepper-status {
      display: inline-block;
      padding: 2px 8px;

      border-radius: 999px;

      font-size: clamp(10px, 0.8vw, 12px);

      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stepper-circle.stepper-error {
      background-color: #ff4d4f !important;
      color: white !important;
      border-color: #ff4d4f !important;
    }
    .stepper-error-status {
      background-color: #ff4d4f !important;
      color: white !important;
      border-color: white !important;
    }

    /* === АНИМАЦИЯ === */
    @keyframes pop {
      from {
        transform: scale(0.95);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .stepper-step {
      display: flex;
      position: relative;
      margin-bottom: 24px;
    }

    .stepper-sql {
      font-weight: 600;
      font-size: clamp(13px, 1.2vw, 16px);
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .stepper-step:last-child {
      margin-bottom: 0;
    }

    .stepper-line {
      position: absolute;
      left: 19px;
      top: 40px;
      bottom: -24px;
      width: 2px;
      background: #2a2a2d;
    }

    .stepper-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      margin-right: 12px;
      z-index: 2;
    }

    /* состояния */
    .stepper-completed .stepper-circle {
      background: var(--accent);
      color: white;
    }

    .stepper-active .stepper-circle {
      border: 2px solid var(--accent);
    }

    .stepper-pending .stepper-circle {
      border: 2px solid #444;
      color: #888;
    }

    .stepper-title {
      font-weight: 600;
    }

    .stepper-status {
      font-size: 12px;
      margin-top: 4px;
      opacity: 0.7;
      border: 1px solid rgba(255, 255, 255, 0.445);
      border-radius: 10px;
      display: inline-block;
      padding: 2px 8px;
      background: var(--accent);
      margin-bottom: 8px;
    }

    .stepper-time {
      font-size: 11px;
      color: var(--muted);
    }

    /* === MOBILE ADAPTATION === */
    @media (max-width: 768px) {
      :root {
        --padding: 14px;
        --radius: 16px;
      }

      .chat-container {
        max-width: 100%;
      }

      .chat-header {
        position: sticky;
        top: 0;
        padding: 12px 14px;
        font-size: 15px;
        background: rgba(11, 13, 18, 0.88);
        backdrop-filter: blur(14px);
      }

      .chat-messages {
        padding: 64px 14px 110px;
      }

      .message {
        max-width: 88%;
      }

      .message-bubble {
        font-size: 14px;
        padding: 10px 12px;
        border-radius: 14px;
      }

      .message-time {
        font-size: 10px;
      }

      .input-area {
        width: calc(100% - 20px);
        max-width: none;
        bottom: 10px;
        padding: 8px 12px;
        gap: 8px;
      }

      .input-area input {
        height: 42px;
        font-size: 15px;
      }

      .input-area button {
        width: 42px;
        height: 42px;
        flex-shrink: 0;
      }

      .stepper-box {
        width: 80%;
        padding: 14px;
      }

      .stepper-step {
        margin-bottom: 18px;
      }

      .stepper-circle {
        width: 34px;
        height: 34px;
        margin-right: 10px;
        flex-shrink: 0;
      }

      .stepper-line {
        left: 16px;
        top: 34px;
        bottom: -18px;
      }

      .stepper-title {
        font-size: 14px;
      }

      .stepper-sql {
        font-size: 13px;
      }

      .stepper-status {
        font-size: 10px;
        padding: 2px 7px;
      }

      .stepper-time {
        font-size: 10px;
      }

      .message-bubble table {
        font-size: 12px;
      }

      .message-bubble th,
      .message-bubble td {
        padding: 6px 8px;
      }
    }

    @media (max-width: 768px) {
      .input-area input {
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      .chat-header {
        padding: 10px 12px;
        font-size: 14px;
      }

      .chat-messages {
        padding: 56px 10px 104px;
      }

      .message {
        max-width: 94%;
      }

      .message.user {
        align-self: flex-end;
      }

      .message.ai {
        align-self: flex-start;
      }

      .message-bubble {
        padding: 9px 11px;
        font-size: 13px;
        border-radius: 13px;
        line-height: 1.35;
      }

      .input-area {
        width: calc(100% - 12px);
        left: 50%;
        transform: translateX(-50%);
        bottom: 6px;
        padding: 7px 10px;
        border-radius: 26px;
      }

      .input-area input {
        height: 40px;
        font-size: 14px;
      }

      .input-area button {
        width: 40px;
        height: 40px;
      }

      #voice-btn.active {
        transform: scale(1.12);
      }

      .stepper-box {
        padding: 12px;
        border-radius: 14px;
      }

      .stepper-step {
        margin-bottom: 16px;
      }

      .stepper-circle {
        width: 30px;
        height: 30px;
        margin-right: 8px;
        font-size: 12px;
      }

      .stepper-line {
        left: 14px;
        top: 30px;
        bottom: -16px;
      }

      .stepper-title {
        font-size: 13px;
      }

      .stepper-sql {
        font-size: 12px;
      }

      .stepper-status {
        font-size: 9px;
        padding: 2px 6px;
      }

      .message-bubble table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
        max-width: 100%;
      }
    }

    .quick-questions {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;

      width: calc(100% - 40px);
      max-width: 700px;

      display: flex;
      gap: 10px;
    }

    @media (max-width: 768px) {
      .quick-questions {
        bottom: 80px;
        padding: 8px 10px;
      }
      .chat-messages {
        padding: 64px 14px 140px;
      }
    }

    .quick-questions button {
      flex: 1;
      min-width: 0;

      padding: 10px 12px;
      border-radius: 12px;

      border: 1px solid rgba(255, 255, 255, 0.08);

      background: var(--panel-2); /* плотный тёмный фон */
      color: var(--text);

      cursor: pointer;
      transition: 0.2s ease;

      white-space: normal;
      word-break: break-word;
      text-align: center;

      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
    }

    .quick-questions button:hover {
      background: var(--accent);

      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(92, 57, 245, 0.046);
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: "Nunito", sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .app-shell {
      height: 100dvh;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 16px;
      padding: 16px;
      box-sizing: border-box;
    }

    /* общая карточная логика */
    .dashboard,
    .chat-container {
      position: relative;
      min-height: 0;
      border-radius: 24px;
      background: linear-gradient(
        180deg,
        rgba(24, 27, 35, 0.96),
        rgba(18, 20, 28, 0.96)
      );
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    /* левая панель */
    .dashboard {
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }

    .dashboard-header {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(11, 13, 18, 0.65);
      backdrop-filter: blur(12px);
      font-weight: 700;
    }

    .dashboard-questions {
      display: grid;
      gap: 10px;
    }

    .dashboard-questions button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--panel-2);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .dashboard-questions button:hover {
      background: var(--accent);
      transform: translateY(-2px);
    }

    .sql-window,
    .chart-box {
      border-radius: 18px;
      background: rgba(11, 13, 18, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 14px;
    }

    .sql-window {
      min-height: 120px;
    }

    .sql-window-title,
    .chart-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    #sqlText {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: #dfe6ff;
      font-size: 14px;
      line-height: 1.5;
    }

    .chart-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #dbChart {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
    }

    /* правая панель */
    .chat-container {
      display: flex;
      flex-direction: column;
      max-width: none;
      margin: 0;
    }

    .chat-header {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    /* сообщения растягиваются внутри правой половины */
    .chat-messages {
      flex: 1;
      min-height: 0;
      padding: 74px 16px 150px;
      overflow-y: auto;
    }

    /* quick questions именно для чата */
    .quick-questions {
      position: absolute;
      bottom: 100px;
      left: 16px;
      right: 16px;
      transform: none;
      max-width: none;
      width: auto;
      z-index: 20;
    }

    .input-area {
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: none;
      z-index: 100;
    }

    /* мобильная адаптация */
    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .app-shell {
        height: auto;
        min-height: 100dvh;
        grid-template-columns: 1fr;
      }

      .dashboard,
      .chat-container {
        min-height: 700px;
      }

      .quick-questions {
        bottom: 92px;
      }
    }

    #dbChart {
      width: 100%;
      height: 93% !important;
    }

    .chart-box {
      height: 240px;
      max-height: 420px; /* важно */
    }

  </style>
  <body>
    <div class="app-shell">
      <aside class="dashboard">
        <div class="dashboard-header">
          <p>Статистика</p>
        </div>

        <div class="dashboard-questions">
          <button
            onclick="
              setDashboardQuestion(
                `SELECT TO_CHAR(order_timestamp, 'YYYY-MM') AS dimension, SUM(price_order_local) AS value FROM anonymized_incity_orders WHERE status_order = 'done' GROUP BY dimension ORDER BY dimension LIMIT 1000;`,
              )
            "
          >
            Сумма выручки по месяцам
          </button>
          <button onclick="setDashboardQuestion('SELECT TOP 10 * FROM orders')">
            Последние 10 заказов
          </button>
          <button
            onclick="
              setDashboardQuestion(
                'SELECT status, COUNT(*) FROM orders GROUP BY status',
              )
            "
          >
            Статусы заказов
          </button>
        </div>

        <div class="sql-window">
          <div class="sql-window-title">SQL запрос</div>
          <pre id="sqlText">SELECT ...</pre>
        </div>

        <div class="chart-box">
          <div class="chart-title">Данные из БД</div>
          <canvas id="dbChart" width="520" height="260"></canvas>
        </div>
      </aside>

      <main class="chat-container">
        <div class="chat-header">
          <p>Ассистент AIDE</p>
        </div>

        <div class="chat-messages" id="messages"></div>

        <div class="quick-questions">
          <button onclick="setQuestion('Сколько записей в таблице?')">
            Сколько записей в таблице?
          </button>
          <button onclick="setQuestion('Выведи первые 10 записей')">
            Выведи первые 10 записей
          </button>
        <button onclick="setQuestion('Сколько данных за 2025 год?')">Сколько данных за 2025 год?</button>
        </div>

        <div class="input-area">
          <input
            type="text"
            id="messageInput"
            placeholder="Напишите сообщение..."
            autocomplete="off"
          />
          <button id="voice-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C13.023 0 14.0041 0.399247 14.7274 1.10991C15.4508 1.82058 15.8571 2.78444 15.8571 3.78947V11.3684C15.8571 12.3735 15.4508 13.3373 14.7274 14.048C14.0041 14.7586 13.023 15.1579 12 15.1579C10.977 15.1579 9.99594 14.7586 9.27259 14.048C8.54923 13.3373 8.14286 12.3735 8.14286 11.3684V3.78947C8.14286 2.78444 8.54923 1.82058 9.27259 1.10991C9.99594 0.399247 10.977 0 12 0ZM21 11.3684C21 15.8274 17.6443 19.5032 13.2857 20.1221V24H10.7143V20.1221C6.35571 19.5032 3 15.8274 3 11.3684H5.57143C5.57143 13.0435 6.24872 14.6499 7.45431 15.8344C8.6599 17.0188 10.295 17.6842 12 17.6842C13.705 17.6842 15.3401 17.0188 16.5457 15.8344C17.7513 14.6499 18.4286 13.0435 18.4286 11.3684H21Z" fill="white"/>
          </svg>

          </button>
          <button onclick="sendMessage()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

      const ws = new WebSocket("wss://higu.su/ws");

      }

      const recognition = new SpeechRecognition();
      recognition.lang = "ru-RU";
      recognition.continuous = false;
      recognition.interimResults = true;
      let isListening = false;
      let finalText = "";

      micBtn.onclick = () => {
        if (!isListening) {
          finalText = "";
          recognition.start();
          micBtn.classList.add("active");
          isListening = true;
        } else {
          isListening = false;
          recognition.stop();
          micBtn.classList.remove("active");
        }
      };
      recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalText += transcript + " ";
          } else {
            interim += transcript;
          }
        }
        input.value = finalText + interim;
      };
      recognition.onend = () => {
        if (isListening) {
          recognition.start();
        }
      };

      // Подключение
      ws.onopen = () => {
        addMessage("","system", "✅ Подключено к серверу. Можете писать сообщения.");
        console.log("Соединение установлено");
        startPing();
      };

      ws.onclose = () => {
        addMessage("","system", "❌ Соединение закрыто. Перезагрузите страницу.");
        console.log("Соединение закрыто");
        ws = new WebSocket("wss://higu.su/ws");
      };

      ws.onerror = (error) => {
        console.error("WebSocket error:", error);
        addMessage("","system", "⚠️ Ошибка соединения");
        addMessage("WebSocket error:", error);
      };

      // Получение сообщений
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'pong') {
        } else {

                                <path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425z"></path>

          const step3 = lastStepperBox.querySelector(
            ".stepper-step.stepper-pending",

          if (step3) {
            console.log("step3");
            // Обновляем содержимое второго шага
            const timeElement = step3.querySelector(".stepper-time");
            timeElement.innerText = formatTime(created_at);

            const statusElement = step3.querySelector(".stepper-status");
            statusElement.innerText = "Запрос выполнен"; // Обновляем статус

            const circleElement = step3.querySelector(".stepper-circle");
            circleElement.className =
              circleElement.innerHTML = `<div class="stepper-circle">
                            <svg viewBox="0 0 16 16" class="bi bi-check-lg" fill="currentColor" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425z"></path>
                            </svg>

        } else if (type === "step4") {

      function setQuestion(text) {
        if (!text || ws.readyState !== WebSocket.OPEN) return;

        // Отправляем сообщение на сервер
        ws.send(JSON.stringify({ text: text }));
      }

      function sendMessage() {
        const text = input.value.trim();
        if (!text || ws.readyState !== WebSocket.OPEN) return;

        // Отправляем сообщение на сервер
        ws.send(JSON.stringify({ text: text }));

        // Очищаем поле ввода
        input.value = "";
      }

      function parseMaps(raw) {
        const rows = [];
        const blocks = raw.match(/map\[[^\]]*]/g) || [];

        for (const block of blocks) {
          const obj = {};
          const inner = block.slice(4, -1);

          const re =
            /([A-Za-z0-9_]+):(\[[^\]]*]|\{[^}]*\}|<nil>|"[^"]*"|[^\s\]]+)/g;
          let m;

          while ((m = re.exec(inner)) !== null) {
            const key = m[1];
            let value = m[2];

            if (value === "<nil>") value = null;
            else if (value.startsWith('"') && value.endsWith('"')) {
              value = value.slice(1, -1);
            }

            obj[key] = value;
          }

          rows.push(obj);
        }

        return rows;
      }

      function renderTableFromMaps(raw) {
        const data = parseMaps(raw);
        if (!data.length) return null;

        const columns = [...new Set(data.flatMap((row) => Object.keys(row)))];

        const table = document.createElement("table");
        table.style.width = "100%";
        table.style.borderCollapse = "collapse";

        const thead = document.createElement("thead");
        const headRow = document.createElement("tr");

        columns.forEach((col) => {
          const th = document.createElement("th");
          th.textContent = col;
          th.style.border = "1px solid #ccc";
          th.style.padding = "6px";
          headRow.appendChild(th);
        });

        thead.appendChild(headRow);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");

        data.forEach((row) => {
          const tr = document.createElement("tr");

          columns.forEach((col) => {
            const td = document.createElement("td");
            td.textContent = row[col] ?? "—";
            td.style.border = "1px solid #ccc";
            td.style.padding = "6px";
            tr.appendChild(td);
          });

          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        return table;
      }

      const sqlText = document.getElementById("sqlText");
      const ctx = document.getElementById("dbChart").getContext("2d");

      let chart; // храним экземпляр

      function setDashboardQuestion(sql) {
        fetch("https://drivee-ai.ru/api/get_chart", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ sql }),
        })
          .then((res) => res.json())
          .then((data) => {
            console.log(data);

            const chartData = data.chart;

            const labels = chartData.map((item) => item.dimension);
            const values = chartData.map((item) => Number(item.value)); // важно!

            renderChart(labels, values);
          })
          .catch((err) => {
            console.error("Ошибка:", err);
          });

        sqlText.textContent = sql;
      }

      function renderChart(labels, values) {
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                data: values,
                borderColor: "#5d39f5",
                backgroundColor: "rgba(93,57,245,0.15)",
                tension: 0.4,
                fill: true,
                pointRadius: 4,
                pointBackgroundColor: "#3980f6",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
            },
            scales: {
              x: {
                ticks: { color: "rgba(233,236,241,0.6)" },
                grid: { color: "rgba(255,255,255,0.05)" },
              },
              y: {
                ticks: { color: "rgba(233,236,241,0.6)" },
                grid: { color: "rgba(255,255,255,0.05)" },
              },
            },
          },
        });
      }

      window.addEventListener("resize", () => {
        if (chart) chart.resize();
      });

      setDashboardQuestion("SELECT COUNT(*) FROM users");

      // Отправка по Enter
      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          sendMessage();
        }
      });

      // Фокус на поле ввода при загрузке
      window.onload = () => {
        input.focus();
      };
