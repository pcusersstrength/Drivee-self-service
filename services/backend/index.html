<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Чат с ИИ</title>
  </head>
  <style>
        @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&display=swap");

    :root {
      /* базовые */
      --bg: #060608;
      --panel: #181b23;
      --panel-2: #1e222d;
      --panel-3: #242938;

      --text: #e9ecf1;
      --muted: rgba(233, 236, 241, 0.6);

      --accent: #5d39f5;
      --accent-2: #3980f6;

      /* таблица */
      --table-bg: #1c1f27;
      --table-header-bg: #232733;
      --table-border: rgba(120, 120, 140, 0.25);
      --table-border-strong: rgba(160, 160, 180, 0.35);
      --table-hover: rgba(57, 128, 246, 0.08);

      --table-radius: 12px;

      /* адаптив */
      --container-width: clamp(320px, 90vw, 900px);
      --padding: clamp(12px, 2vw, 20px);
      --radius: clamp(12px, 2vw, 20px);
    }
    
    .quick-questions {
      margin-bottom: 10px;
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;

      width: calc(100% - 40px);
      max-width: 700px;

      display: flex;
      gap: 10px;
    }

    @media (max-width: 768px) {
      .quick-questions {
        bottom: 80px;
        padding: 8px 10px;
      }
      .chat-messages {
        padding: 64px 14px 140px;
      }
    }

    .quick-questions button {
      flex: 1;
      min-width: 0;

      padding: 10px 12px;
      border-radius: 12px;

      border: 1px solid rgba(255, 255, 255, 0.08);

      background: var(--panel-2); /* плотный тёмный фон */
      color: var(--text);

      cursor: pointer;
      transition: 0.2s ease;

      white-space: normal;
      word-break: break-word;
      text-align: center;

      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
    }

    .quick-questions button:hover {
      background: var(--accent);

      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(92, 57, 245, 0.046);
    }

    /* === BODY === */
    body {
      margin: 0;
      background: var(--bg);
      font-family: "Nunito", sans-serif;
      color: var(--text);
    }

    /* === КОНТЕЙНЕР === */
    .chat-container {
      height: 100dvh;
      max-width: var(--container-width);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* === HEADER === */
    .chat-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      z-index: 1000;
      padding: var(--padding);
      font-size: clamp(14px, 1.5vw, 18px);
      font-weight: 600;
      background: rgba(11, 13, 18, 0.75);
      backdrop-filter: blur(12px);
    }

    .chat-settings-btn {
      border: none;
      background: none;
    }

    /* === СООБЩЕНИЯ === */
    .chat-messages {
      flex: 1;
      display: flex;
      flex-direction: column;

      overflow-y: auto;

      padding: clamp(70px, 10vh, 100px) var(--padding) calc(140px);
    }

    /* === СКРОЛЛ === */
    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
    }

    /* === MESSAGE === */
    .message {
      display: flex;
      flex-direction: column;
      margin-bottom: clamp(8px, 1vw, 12px);
      align-items: flex-start;
      max-width: clamp(220px, 70%, 600px);
    }

    .message.user {
      align-self: flex-end;
    }
    .message.ai {
      align-self: flex-start;
    }

    .message-bubble {
      padding: clamp(8px, 1vw, 14px);
      border-radius: var(--radius);
      max-width: 100%;
      overflow: hidden;
      overflow-x: auto;
      font-size: clamp(13px, 1vw, 16px);
      line-height: 1.4;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      animation: pop 0.15s ease-out;
    }

    /* user */
    .message.user .message-bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border-bottom-right-radius: 6px;
    }

    /* ai */
    .message.ai .message-bubble {
      background: var(--panel);
      border-bottom-left-radius: 6px;
    }

    /* время */
    .message-time {
      font-size: clamp(10px, 0.8vw, 12px);
      color: var(--muted);
      margin-top: 4px;
      padding: 0 6px;
    }

    /* === INPUT === */
    .input-area {
      position: fixed;
      bottom: clamp(10px, 2vh, 20px);
      left: 50%;
      transform: translateX(-50%);

      width: calc(100% - 40px);
      max-width: 700px;

      display: flex;
      gap: clamp(6px, 1vw, 10px);
      align-items: center;

      padding: clamp(8px, 1vw, 12px) clamp(15px, 2vw, 20px);

      border-radius: 999px;

      background: rgba(11, 13, 18, 0.4);
      backdrop-filter: blur(12px);

      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .input-area input {
      flex: 1;
      height: clamp(40px, 5vh, 50px);

      border: none;
      outline: none;
      background: transparent;

      color: var(--text);
      font-size: clamp(14px, 1vw, 16px);
    }

    .input-area button {
      width: clamp(40px, 5vh, 50px);
      height: clamp(40px, 5vh, 50px);

      border-radius: 50%;
      border: none;

      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;

      transition: 0.2s;
    }

    .input-area button:hover {
      transform: scale(1.05);
    }

    #voice-btn.active {
      transform: scale(1.25);
    }

    /* плавная пульсация */
    #voice-btn.active {
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(1.15);
      }
      50% {
        transform: scale(1.3);
      }
      100% {
        transform: scale(1.15);
      }
    }

    /* === ТАБЛИЦА === */
    .message-bubble table {
      width: max-content;
      min-width: 100%;

      border-collapse: separate;
      border-spacing: 0;

      background: var(--table-bg);
      border: 1px solid var(--table-border);
      border-radius: var(--table-radius);
      overflow: hidden;
    }

    .message-bubble th {
      position: sticky;
      top: 0;
      z-index: 2;

      padding: clamp(6px, 1vw, 10px);
      font-size: clamp(11px, 0.9vw, 13px);

      background: var(--table-header-bg);
      color: var(--muted);

      border-bottom: 1px solid var(--table-border-strong);
    }

    .message-bubble td {
      padding: clamp(6px, 1vw, 10px);
      border-bottom: 1px solid var(--table-border);
    }

    .message-bubble tbody tr:hover td {
      background: var(--table-hover);
    }

    /* === SCROLL TABLE === */
    .message-bubble::-webkit-scrollbar {
      height: 6px;
    }

    .message-bubble::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
    }

    /* === STEPPER === */
    .stepper-box {
      background: var(--panel);
      border-radius: var(--radius);
      padding: clamp(14px, 2vw, 20px);

      margin-bottom: 16px;
      width: 70%;

      align-self: stretch;
    }

    .stepper-step {
      display: flex;
      margin-bottom: 20px;
      position: relative;
    }



    .stepper-status {
      display: inline-block;
      padding: 2px 8px;

      border-radius: 999px;

      font-size: clamp(10px, 0.8vw, 12px);

      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* === АНИМАЦИЯ === */
    @keyframes pop {
      from {
        transform: scale(0.95);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .stepper-step {
      display: flex;
      position: relative;
      margin-bottom: 24px;
    }

    .stepper-circle.stepper-error {
      background-color: #ff4d4f !important;
      color: white !important;
      border-color: #ff4d4f !important;
    }
    .stepper-error-status {
      background-color: #ff4d4f !important; 
      color: white !important;
      border-color: white !important;
    }

    .stepper-sql {
      font-weight: 600;
      font-size: clamp(13px, 1.2vw, 16px);
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .stepper-step:last-child {
      margin-bottom: 0;
    }

    .stepper-line {
      position: absolute;
      left: 19px;
      top: 40px;
      bottom: -24px;
      width: 2px;
      background: #2a2a2d;
    }

    .stepper-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      margin-right: 12px;
      z-index: 2;
    }

    /* состояния */
    .stepper-completed .stepper-circle {
      background: var(--accent);
      color: white;
    }

    .stepper-active .stepper-circle {
      border: 2px solid var(--accent);
    }

    .stepper-pending .stepper-circle {
      border: 2px solid #444;
      color: #888;
    }

    .stepper-title {
      font-weight: 600;
    }

    .stepper-status {
      font-size: 12px;
      margin-top: 4px;
      opacity: 0.7;
      border: 1px solid rgba(255, 255, 255, 0.445);
      border-radius: 10px;
      display: inline-block;
      padding: 2px 8px;
      background: var(--accent);
      margin-bottom: 8px;
    }

    .stepper-time {
      font-size: 11px;
      color: var(--muted);
    }

    /* === MOBILE ADAPTATION === */
    @media (max-width: 768px) {
      :root {
        --padding: 14px;
        --radius: 16px;
      }

      .chat-container {
        max-width: 100%;
      }

      .chat-header {
        position: sticky;
        top: 0;
        padding: 12px 14px;
        font-size: 15px;
        background: rgba(11, 13, 18, 0.88);
        backdrop-filter: blur(14px);
      }

      .chat-messages {
        padding: 64px 14px 110px;
      }

      .message {
        max-width: 88%;
      }

      .message-bubble {
        font-size: 14px;
        padding: 10px 12px;
        border-radius: 14px;
      }

      .message-time {
        font-size: 10px;
      }

      .input-area {
        width: calc(100% - 20px);
        max-width: none;
        bottom: 10px;
        padding: 8px 12px;
        gap: 8px;
      }

      .input-area input {
        height: 42px;
        font-size: 15px;
      }

      .input-area button {
        width: 42px;
        height: 42px;
        flex-shrink: 0;
      }

      .stepper-box {
        width: 80%;
        padding: 14px;
      }

      .stepper-step {
        margin-bottom: 18px;
      }

      .stepper-circle {
        width: 34px;
        height: 34px;
        margin-right: 10px;
        flex-shrink: 0;
      }

      .stepper-line {
        left: 16px;
        top: 34px;
        bottom: -18px;
      }

      .stepper-title {
        font-size: 14px;
      }

      .stepper-sql {
        font-size: 13px;
      }

      .stepper-status {
        font-size: 10px;
        padding: 2px 7px;
      }

      .stepper-time {
        font-size: 10px;
      }

      .message-bubble table {
        font-size: 12px;
      }

      .message-bubble th,
      .message-bubble td {
        padding: 6px 8px;
      }
    }

    @media (max-width: 768px) {
      .input-area input {
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      .chat-header {
        padding: 10px 12px;
        font-size: 14px;
      }

      .chat-messages {
        padding: 56px 10px 104px;
      }

      .message {
        max-width: 94%;
      }

      .message.user {
        align-self: flex-end;
      }

      .message.ai {
        align-self: flex-start;
      }

      .message-bubble {
        padding: 9px 11px;
        font-size: 13px;
        border-radius: 13px;
        line-height: 1.35;
      }

      .input-area {
        width: calc(100% - 12px);
        left: 50%;
        transform: translateX(-50%);
        bottom: 6px;
        padding: 7px 10px;
        border-radius: 26px;
      }

      .input-area input {
        height: 40px;
        font-size: 14px;
      }

      .input-area button {
        width: 40px;
        height: 40px;
      }

      #voice-btn.active {
        transform: scale(1.12);
      }

      .stepper-box {
        padding: 12px;
        border-radius: 14px;
      }

      .stepper-step {
        margin-bottom: 16px;
      }

      .stepper-circle {
        width: 30px;
        height: 30px;
        margin-right: 8px;
        font-size: 12px;
      }

      .stepper-line {
        left: 14px;
        top: 30px;
        bottom: -16px;
      }

      .stepper-title {
        font-size: 13px;
      }

      .stepper-sql {
        font-size: 12px;
      }

      .stepper-status {
        font-size: 9px;
        padding: 2px 6px;
      }

      .message-bubble table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
        max-width: 100%;
      }

    }

  </style>

        <button onclick="sendMessage()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M11.2953 0.300821C11.4823 0.108196 11.7357 0 12 0C12.2643 0 12.5177 0.108196 12.7047 0.300821L20.6826 8.5297C20.7806 8.62387 20.8592 8.73743 20.9137 8.86361C20.9682 8.98978 20.9975 9.12599 20.9998 9.2641C21.0022 9.40221 20.9776 9.5394 20.9274 9.66748C20.8773 9.79556 20.8026 9.91191 20.7079 10.0096C20.6132 10.1073 20.5004 10.1843 20.3762 10.236C20.2521 10.2877 20.1191 10.3131 19.9852 10.3107C19.8513 10.3083 19.7192 10.278 19.5969 10.2218C19.4746 10.1656 19.3645 10.0845 19.2732 9.98347L12.9972 3.51008V22.9714C12.9972 23.2442 12.8922 23.5058 12.7052 23.6987C12.5181 23.8916 12.2645 24 12 24C11.7355 24 11.4819 23.8916 11.2948 23.6987C11.1078 23.5058 11.0028 23.2442 11.0028 22.9714V3.51008L4.72683 9.98347C4.63553 10.0845 4.52543 10.1656 4.40311 10.2218C4.28078 10.278 4.14873 10.3083 4.01483 10.3107C3.88093 10.3131 3.74793 10.2877 3.62375 10.236C3.49958 10.1843 3.38678 10.1073 3.29208 10.0096C3.19739 9.91191 3.12273 9.79556 3.07258 9.66748C3.02242 9.5394 2.99779 9.40221 3.00016 9.2641C3.00252 9.12599 3.03183 8.98978 3.08633 8.86361C3.14083 8.73743 3.21942 8.62387 3.3174 8.5297L11.2953 0.300821Z" fill="white"/>

    <script>
      const ws = new WebSocket("wss://higu.su/ws");
      const messagesDiv = document.getElementById("messages");
      const input = document.getElementById("messageInput");

      const micBtn = document.getElementById("voice-btn");
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("Браузер не поддерживает распознавание речи");
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "ru-RU";
      recognition.continuous = false;
      recognition.interimResults = true;
      let isListening = false;
      let finalText = "";

      micBtn.onclick = () => {
        if (!isListening) {
          finalText = "";
          recognition.start();
          micBtn.classList.add("active");
          isListening = true;
        } else {
          isListening = false;
          recognition.stop();
          micBtn.classList.remove("active");
        }
      };
      recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalText += transcript + " ";
          } else {
            interim += transcript;
          }
        }
        input.value = finalText + interim;
      };
      recognition.onend = () => {
        if (isListening) {
          recognition.start();
        }
      };

      // Подключение
      ws.onopen = () => {
        addMessage("","system", "✅ Подключено к серверу. Можете писать сообщения.");
        console.log("Соединение установлено");
        startPing();
      };

      ws.onclose = () => {
        addMessage("","system", "❌ Соединение закрыто. Перезагрузите страницу.");
        console.log("Соединение закрыто");
        ws = new WebSocket("wss://higu.su/ws");
      };

      ws.onerror = (error) => {
        console.error("WebSocket error:", error);
        addMessage("","system", "⚠️ Ошибка соединения");
        addMessage("WebSocket error:", error);
      };

      // Получение сообщений
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'pong') {
        } else {
          addMessage(msg.type, msg.username, msg.text, msg.created_at);
          console.log(msg.created_at)
        }
      };

      function startPing() {
        pingInterval = setInterval(() => {
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: "ping" }));
          }
        }, 30000); // Отправляем пинг каждые 30 секунд
      }

        function addMessage(type, sender, text, created_at) {
        function formatTime(created_at) {
          return new Date(created_at).toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          });
        }

        if (type === "step1") {
          console.log("step1");
          const stepperBox = document.createElement("div");
          stepperBox.className = "stepper-box";

          // Создание первого шага
          const step1 = document.createElement("div");
          step1.className = "stepper-step stepper-completed";
          step1.innerHTML = `<div class="stepper-circle">
                        <svg viewBox="0 0 16 16" class="bi bi-check-lg" fill="currentColor" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425z"></path>
                        </svg>
                    </div>
                    <div class="stepper-line"></div>
                    <div class="stepper-content">
                        <div class="stepper-title">Запрос выполнен</div>
                        <div class="stepper-status">Готово</div>
                        <div class="stepper-time">${formatTime(created_at)}</div>
                    </div>`;
          stepperBox.appendChild(step1);

          // Создание второго шага
          const step2 = document.createElement("div");
          step2.className = "stepper-step stepper-active";
          step2.innerHTML = `<div class="stepper-circle">2</div>
                    <div class="stepper-line"></div>
                    <div class="stepper-content">
                        <div class="stepper-title">Обработка ИИ</div>
                        <div class="stepper-status">In Progress</div>
                        <div class="stepper-sql">Ожидание</div>
                        <div class="stepper-time">${created_at}</div>
                    </div>`;
          stepperBox.appendChild(step2);

          // Создание третьего шага
          const step3 = document.createElement("div");
          step3.className = "stepper-step stepper-pending";
          step3.innerHTML = `<div class="stepper-circle">3</div>
                    <div class="stepper-content">
                        <div class="stepper-title">Исполнение в БД</div>
                        <div class="stepper-status">Pending</div>
                        <div class="stepper-time">${formatTime(created_at)}</div>
                    </div>`;
          stepperBox.appendChild(step3);

          // Создание кнопок управления
          const controls = document.createElement("div");
          controls.className = "stepper-controls";
          controls.innerHTML = `<button class="stepper-button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"></path>
                        </svg>
                        Previous
                    </button>
                    <button class="stepper-button stepper-button-primary">
                        Next
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-right" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8"></path>
                        </svg>
                    </button>`;

          // Добавляем созданный элемент в контейнер
          messagesDiv.appendChild(stepperBox);
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        } else if (type === "step2") {
          const lastStepperBox = messagesDiv.querySelector(
            ".stepper-box:last-child",
          );
          const step2 = lastStepperBox.querySelector(
            ".stepper-step.stepper-active",
          );

          if (step2) {
            console.log("step2");
            // Обновляем содержимое второго шага
            const timeElement = step2.querySelector(".stepper-time");
            timeElement.innerText = formatTime(created_at); // Обновляем время

            const statusElement = step2.querySelector(".stepper-status");
            statusElement.innerText = "Запрос выполнен"; // Обновляем статус

            const sqlElement = step2.querySelector(".stepper-sql");
            sqlElement.innerText = text; // Обновляем статус

            const circleElement = step2.querySelector(".stepper-circle");
            circleElement.className =
              circleElement.innerHTML = `<div class="stepper-circle">
                            <svg viewBox="0 0 16 16" class="bi bi-check-lg" fill="currentColor" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425z"></path>
                            </svg>
                        </div>`;

            step2.className = "stepper-step stepper-completed";
          }
        } else if (type === "step3") {
          const lastStepperBox = messagesDiv.querySelector(
            ".stepper-box:last-child",
          );
          const step3 = lastStepperBox.querySelector(
            ".stepper-step.stepper-pending",
          );

          if (step3) {
            console.log("step3");
            // Обновляем содержимое второго шага
            const timeElement = step3.querySelector(".stepper-time");
            timeElement.innerText = formatTime(created_at);

            const statusElement = step3.querySelector(".stepper-status");
            statusElement.innerText = "Запрос выполнен"; // Обновляем статус

            const circleElement = step3.querySelector(".stepper-circle");
            circleElement.className =
              circleElement.innerHTML = `<div class="stepper-circle">
                            <svg viewBox="0 0 16 16" class="bi bi-check-lg" fill="currentColor" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425z"></path>
                            </svg>
                        </div>`;

            step3.className = "stepper-step stepper-completed";

            const div = document.createElement("div");
            div.className = `message ${sender === "User" ? "user" : sender === "AI" ? "ai" : "system"}`;

            const bubble = document.createElement("div");
            bubble.className = "message-bubble";

            const table = renderTableFromMaps(text);

            if (table) {
              bubble.innerHTML = "";
              bubble.appendChild(table);
            } else {
              bubble.textContent = text;
            }

            const time = document.createElement("div");
            time.className = "message-time";

            // ← Вот здесь главное изменение
            if (created_at) {
              const date = new Date(created_at);
              time.textContent = date.toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              });
            } else {
              time.textContent = new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              });
            }

            div.appendChild(bubble);
            div.appendChild(time);
            messagesDiv.appendChild(div);

            // Автоскролл вниз
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
          }
        } else if (type === "step4") {
          console.log("step4");
          const lastStepperBox = messagesDiv.querySelector(
            ".stepper-box:last-child",
          );
          const step2 = lastStepperBox.querySelector(
            ".stepper-step.stepper-active",
          );
          const step3 = lastStepperBox.querySelector(
            ".stepper-step.stepper-pending",
          );

          const step2Status = step2.querySelector(".stepper-status");
          step2Status.innerText = "Готово";
          const step2Сircle = step2.querySelector(".stepper-circle");
          const step2Time = step2.querySelector(".stepper-time");
          step2Time.innerText = formatTime(created_at);

          // Обновляем содержимое второго шага
          const timeElement = step3.querySelector(".stepper-time");
          timeElement.innerText = formatTime(created_at);

          const statusElement = step3.querySelector(".stepper-status");
          statusElement.innerText = "Ошибка"; // Обновляем статус
          statusElement.classList.add("stepper-error-status");

          const sqlElement = step2.querySelector(".stepper-sql");
          sqlElement.innerText = text;
          const circleElement = step3.querySelector(".stepper-circle");
          circleElement.classList.add("stepper-error");


          // ← Вот здесь главное изменение
          // if (created_at) {
          //   const date = new Date(created_at);
          //   time.textContent = date.toLocaleTimeString([], {
          //     hour: "2-digit",
          //     minute: "2-digit",
          //   });
          // } else {
          //   time.textContent = new Date().toLocaleTimeString([], {
          //     hour: "2-digit",
          //     minute: "2-digit",
          //   });
          // }
        } else {
          const div = document.createElement("div");
          div.className = `message ${sender === "User" ? "user" : sender === "AI" ? "ai" : "system"}`;

          const bubble = document.createElement("div");
          bubble.className = "message-bubble";
          bubble.textContent = text;

          const table = renderTableFromMaps(text);

          if (table) {
            bubble.appendChild(table);
          } else {
            bubble.textContent = text;
          }

          const time = document.createElement("div");
          time.className = "message-time";

          // ← Вот здесь главное изменение
          if (created_at) {
            const date = new Date(created_at);
            time.textContent = date.toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
          } else {
            time.textContent = new Date().toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
          }

          div.appendChild(bubble);
          div.appendChild(time);
          messagesDiv.appendChild(div);

          // Автоскролл вниз
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
      }

      function setQuestion(text) {
        if (!text || ws.readyState !== WebSocket.OPEN) return;

        // Отправляем сообщение на сервер
        ws.send(JSON.stringify({ text: text }));
      }

      function sendMessage() {
        const text = input.value.trim();
        if (!text || ws.readyState !== WebSocket.OPEN) return;

        // Отправляем сообщение на сервер
        ws.send(JSON.stringify({ text: text }));

        // Очищаем поле ввода
        input.value = "";
      }

      function parseMaps(raw) {
        const rows = [];
        const blocks = raw.match(/map\[[^\]]*]/g) || [];

        for (const block of blocks) {
          const obj = {};
          const inner = block.slice(4, -1);

          const re =
            /([A-Za-z0-9_]+):(\[[^\]]*]|\{[^}]*\}|<nil>|"[^"]*"|[^\s\]]+)/g;
          let m;

          while ((m = re.exec(inner)) !== null) {
            const key = m[1];
            let value = m[2];

            if (value === "<nil>") value = null;
            else if (value.startsWith('"') && value.endsWith('"')) {
              value = value.slice(1, -1);
            }

            obj[key] = value;
          }

          rows.push(obj);
        }

        return rows;
      }

      function renderTableFromMaps(raw) {
        const data = parseMaps(raw);
        if (!data.length) return null;

        const columns = [...new Set(data.flatMap((row) => Object.keys(row)))];

        const table = document.createElement("table");
        table.style.width = "100%";
        table.style.borderCollapse = "collapse";

        const thead = document.createElement("thead");
        const headRow = document.createElement("tr");

        columns.forEach((col) => {
          const th = document.createElement("th");
          th.textContent = col;
          th.style.border = "1px solid #ccc";
          th.style.padding = "6px";
          headRow.appendChild(th);
        });

        thead.appendChild(headRow);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");

        data.forEach((row) => {
          const tr = document.createElement("tr");

          columns.forEach((col) => {
            const td = document.createElement("td");
            td.textContent = row[col] ?? "—";
            td.style.border = "1px solid #ccc";
            td.style.padding = "6px";
            tr.appendChild(td);
          });

          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        return table;
      }
      // Отправка по Enter
      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          sendMessage();
        }
      });

      // Фокус на поле ввода при загрузке
      window.onload = () => {
        input.focus();
      };
    </script>
